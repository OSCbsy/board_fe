<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
</head>
<body>
<h1>게시글 수정</h1>

<form th:action="@{/boards/{id}/edit(id=${board.id})}" method="post">
    <div>
        <label>제목</label>
        <input type="text" name="title" th:value="${board.title}" required>
    </div>

    <div>
        <label>작성자</label>
        <input type="text" name="author" th:value="${board.author}" required>
    </div>

    <div>
        <label>내용</label>
        <textarea name="content" th:text="${board.content}" required></textarea>
    </div>

    <button type="submit">수정</button>
</form>

<a th:href="@{/boards/{id}(id=${board.id})}">상세</a>
<a th:href="@{/boards}">목록</a>

</body>
</html>
