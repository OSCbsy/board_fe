<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
</head>
<body>
<h1>게시글 목록</h1>

<a th:href="@{/boards/write}">글쓰기</a>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>제목</th>
        <th>작성자</th>
        <th>상세</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="board : ${boards}">
        <td th:text="${board.id}">1</td>
        <td th:text="${board.title}">제목</td>
        <td th:text="${board.author}">작성자</td>
        <td>
            <a th:href="@{/boards/{id}(id=${board.id})}">상세보기</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
